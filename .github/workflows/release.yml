name: release
on:
  push:
    tags:
    - 'v3.[0-9]+.[0-9]+'
    - 'v3.[0-9]+.[0-9]+-beta.[0-9]+'

jobs:
  create-release:
    name: create-release
    runs-on: ubuntu-24.04
    outputs:
      sws_version: ${{ env.SWS_VERSION }}
    steps:
      - name: Get the release version from the tag
        shell: bash
        if: env.SWS_VERSION == ''
        run: |
          # Apparently, this is the right way to get a tag name. Really?
          #
          # See: https://github.community/t5/GitHub-Actions/How-to-get-just-the-tag-name/m-p/32167/highlight/true#M1027
          echo "SWS_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "version is: ${{ env.SWS_VERSION }}"
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.SWS_VERSION }} --verify-tag --draft --title="${{ env.SWS_VERSION }}"

  build-release:
    name: build-release
    needs: ['create-release']
    runs-on: ${{ matrix.os }}
    env:
      # For some builds, we use cross to test on 32-bit and big-endian
      # systems.
      CARGO_BIN: cargo
      # When CARGO_BIN is set to CROSS, this is set to `--target matrix.target`.
      TARGET_FLAGS: ""
      # When CARGO_BIN is set to CROSS, TARGET_DIR includes matrix.target.
      TARGET_DIR: ./target
      # Emit backtraces on panics.
      RUST_BACKTRACE: 1
      # SWS features for Cargo build
      CARGO_FEATURES: "--features=all"
    strategy:
      matrix:
        build:
          - linux-musl
          - linux-musl-arm64
          - linux-musl-i686
          - linux-gnu
          - linux-gnu-arm64
          - linux-gnu-i686
          - linux-arm-gnueabihf
          - linux-musl-armv6
          - linux-musl-armv7
          - linux-gnu-armv7
          - linux-ppc64le
          - linux-s390x
          # - linux-android-armv7
          - linux-android-arm64
          - netbsd
          - illumos
          - macos
          - macos-arm64
          - windows-msvc
          - windows-msvc-i686
          - windows-msvc-arm64
          - windows-pc-gnu
          # FIPS builds
          - linux-gnu-fips
          - linux-gnu-arm64-fips
          - linux-musl-fips
          - linux-musl-arm64-fips
          - freebsd
          - freebsd-i686
        include:
        - build: linux-musl
          native: true
          os: ubuntu-24.04
          rust: stable
          target: x86_64-unknown-linux-musl
        - build: linux-musl-i686
          os: ubuntu-24.04
          rust: stable
          target: i686-unknown-linux-musl
        - build: linux-musl-arm64
          native: true
          os: ubuntu-24.04-arm
          rust: stable
          target: aarch64-unknown-linux-musl
        - build: linux-gnu
          native: true
          os: ubuntu-24.04
          rust: stable
          target: x86_64-unknown-linux-gnu
        - build: linux-gnu-i686
          os: ubuntu-24.04
          rust: stable
          target: i686-unknown-linux-gnu
        - build: linux-gnu-arm64
          native: true
          os: ubuntu-24.04-arm
          rust: stable
          target: aarch64-unknown-linux-gnu
        - build: linux-arm-gnueabihf
          os: ubuntu-24.04
          rust: stable
          target: arm-unknown-linux-gnueabihf
        - build: linux-musl-armv6
          os: ubuntu-24.04
          rust: stable
          target: arm-unknown-linux-musleabihf
        - build: linux-musl-armv7
          os: ubuntu-24.04
          rust: stable
          target: armv7-unknown-linux-musleabihf
        - build: linux-gnu-armv7
          os: ubuntu-24.04
          rust: stable
          target: armv7-unknown-linux-gnueabihf
        - build: linux-ppc64le
          os: ubuntu-24.04
          rust: stable
          target: powerpc64le-unknown-linux-gnu
        - build: linux-s390x
          os: ubuntu-24.04
          rust: stable
          target: s390x-unknown-linux-gnu
        #  NOTE: looks like not supported by `listenfd` crate
        # - build: linux-android-armv7
        #   os: ubuntu-24.04
        #   rust: stable
        #   target: armv7-linux-androideabi
        - build: linux-android-arm64
          os: ubuntu-24.04
          rust: stable
          target: aarch64-linux-android
        - build: netbsd
          os: ubuntu-24.04
          rust: stable
          target: x86_64-unknown-netbsd
        - build: illumos
          os: ubuntu-24.04
          rust: stable
          target: x86_64-unknown-illumos
        - build: macos
          native: true
          os: macos-26
          rust: stable
          target: x86_64-apple-darwin
        - build: macos-arm64
          native: true
          os: macos-26
          rust: stable
          target: aarch64-apple-darwin
        - build: windows-msvc
          native: true
          os: windows-2025
          rust: stable
          target: x86_64-pc-windows-msvc
        - build: windows-msvc-i686
          native: true
          os: windows-2025
          rust: stable
          target: i686-pc-windows-msvc
        - build: windows-msvc-arm64
          native: true
          os: windows-11-arm
          rust: stable
          target: aarch64-pc-windows-msvc
        - build: windows-pc-gnu
          native: true
          os: windows-2025
          rust: stable
          target: x86_64-pc-windows-gnu
        # FIPS builds
        - build: linux-gnu-fips
          native: true
          os: ubuntu-24.04
          rust: stable
          target: x86_64-unknown-linux-gnu
        - build: linux-musl-fips
          native: true
          os: ubuntu-24.04
          rust: stable
          target: x86_64-unknown-linux-musl
        - build: linux-gnu-arm64-fips
          native: true
          os: ubuntu-24.04-arm
          rust: stable
          target: aarch64-unknown-linux-gnu
        - build: linux-musl-arm64-fips
          native: true
          os: ubuntu-24.04-arm
          rust: stable
          target: aarch64-unknown-linux-musl
        - build: freebsd
          os: ubuntu-24.04
          rust: stable
          target: x86_64-unknown-freebsd
        - build: freebsd-i686
          os: ubuntu-24.04
          rust: stable
          target: i686-unknown-freebsd

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ matrix.rust }}
        target: ${{ matrix.target }}

    - name: Set up Cross
      if: ${{ !matrix.native && matrix.target != '' }}
      shell: bash
      run: |
        echo "Configuring Cross..."
        # Use 'cargo.sh' script for Android targets only
        if [[ "${{ matrix.build }}" == "linux-android-armv7" ]] || [[ "${{ matrix.build }}" == "linux-android-arm64" ]]; then
          echo "CARGO_BIN=scripts/ci/cargo.sh" >> $GITHUB_ENV
        else
          target=''
          case "${{ matrix.os }}" in
            *macos*)
              target=x86_64-apple-darwin
            ;;
            *)
              target=x86_64-unknown-linux-musl
            ;;
          esac

          echo "Installing cross..."
          curl -sSL \
            "https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-$target.tar.gz" \
            | sudo tar zxf - -C /usr/local/bin/ cross cross-util
          cross -V
          echo "CARGO_BIN=/usr/local/bin/cross" >> $GITHUB_ENV
        fi

    - name: Setup Cargo
      shell: bash
      run: |
        if [[ "${{ matrix.target }}" != "" ]]; then
          echo "TARGET_FLAGS=--target=${{ matrix.target }}" >> $GITHUB_ENV
          echo "TARGET_DIR=./target/${{ matrix.target }}" >> $GITHUB_ENV
        fi
        echo "cargo command is: ${{ env.CARGO_BIN }}"
        echo "target flag is: ${{ env.TARGET_FLAGS }}"
        echo "target dir is: ${{ env.TARGET_DIR }}"

    - name: Setup Windows ARM64
      if: ${{ contains(matrix.build, 'windows-msvc-arm64') }}
      run: |
        # ring crate: add Visual Studio Build Tools "VS 2022 C++ ARM64 build tools" and "clang" components
        $env:Path += ";C:\Program Files (x86)\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm\x64\bin"

    - name: Setup Linux/BSD tools
      shell: bash
      if: ${{ !startsWith(matrix.os, 'windows') }}
      run: |
        scripts/ci/install_tools.sh --build=${{ matrix.build }} --target=${{ matrix.target }}

    - name: Build release binary
      shell: bash
      run: ${{ env.CARGO_BIN }} build --bin static-web-server -vv --release ${{ env.CARGO_FEATURES }} ${{ env.TARGET_FLAGS }}

    - name: Build archive
      shell: bash
      run: |
        suffix=""
        if [[ "${{ matrix.build }}" == *-fips ]]; then
          suffix="-fips"
        fi

        staging="static-web-server-${{ needs.create-release.outputs.sws_version }}-${{ matrix.target }}$suffix"
        mkdir -p "$staging/"
        mkdir -p bin

        cp {README.md,LICENSE-APACHE,LICENSE-MIT} "$staging/"

        if [[ "${{ matrix.os }}" == windows-* ]]; then
          cp "target/${{ matrix.target }}/release/static-web-server.exe" "$staging/"
          7z a "$staging.zip" "$staging"
          echo "ASSET=$staging.zip" >> $GITHUB_ENV
        else
          # The man page is only generated on Unix systems.
          cp "target/${{ matrix.target }}/release/static-web-server" "$staging/"
          cp "$staging/static-web-server" bin/
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> $GITHUB_ENV
        fi

    - name: Upload release archive
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ needs.create-release.outputs.sws_version }} ${{ env.ASSET }}
